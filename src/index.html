<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Brew Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#fff3de;--coffee:#5f3b27;--orange:#ffad56;--dark:#331d11;--mint:#9ee6d8}
    *{box-sizing:border-box}body{margin:0;font-family:Nunito,sans-serif;background:linear-gradient(#ffe9c8,#ffd7aa);color:var(--dark)}
    h1,h2,h3,.brand{font-family:Fredoka,sans-serif} .hidden{display:none!important}
    .btn{border:3px solid var(--dark);border-radius:12px;background:var(--orange);font-family:Fredoka;padding:8px 12px;cursor:pointer;box-shadow:3px 3px 0 var(--dark)}
    .btn:active{transform:translateY(1px)} .btn.sub{background:#fff}
    .top{height:58px;display:flex;justify-content:space-between;align-items:center;padding:0 12px;background:var(--cream);border-bottom:3px solid var(--dark)}
    .layout{display:grid;grid-template-columns:240px 1fr 280px;height:calc(100vh - 116px);gap:10px;padding:10px}
    .panel{background:var(--cream);border:3px solid var(--dark);border-radius:14px;padding:8px;box-shadow:3px 3px 0 var(--dark);overflow:auto}
    .center{position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(#fff7e6,#ffefd8)}
    .cup{font-size:92px;width:210px;height:210px;border-radius:50%;border:4px solid var(--dark);display:grid;place-items:center;background:#fff;cursor:pointer;transition:.12s}
    .cup:active{transform:scale(.95)} .coin{position:absolute;font-weight:800;animation:pop 1s forwards}
    @keyframes pop{to{transform:translateY(-60px);opacity:0}} .row{display:flex;gap:8px;flex-wrap:wrap}
    .card{border:3px solid var(--dark);border-radius:12px;background:#fff;padding:8px;margin-bottom:8px}
    .nav{height:58px;display:flex;gap:8px;align-items:center;justify-content:center;background:var(--cream);border-top:3px solid var(--dark)}
    .xp{height:16px;border:3px solid var(--dark);border-radius:10px;background:#fff;overflow:hidden}.xp>div{height:100%;background:var(--mint)}
    .overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:20}
    .modal{width:min(900px,94vw);max-height:92vh;overflow:auto;background:var(--cream);border:3px solid var(--dark);border-radius:16px;box-shadow:6px 6px 0 var(--dark);padding:16px}
    input,textarea,select{width:100%;border:2px solid var(--dark);border-radius:10px;padding:8px;font:inherit;margin:4px 0 8px}
    .slot{width:31%;min-width:220px}.muted{opacity:.7;font-size:12px}
  </style>
</head>
<body>
  <div id="auth" class="overlay">
    <div class="modal">
      <h2>☕ Pick a Username</h2>
      <label>Username</label><input id="usernameInput" />
      <button class="btn" id="enterBtn">Enter Café</button>
      <p id="authMsg" class="muted">Any username works.</p>
    </div>
  </div>

  <div id="slotScreen" class="overlay hidden">
    <div class="modal">
      <h2>Choose a Café Slot</h2>
      <div id="slotCards" class="row"></div>
      <button class="btn sub" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div id="profileScreen" class="overlay hidden">
    <div class="modal">
      <h2>Public Profile</h2>
      <div class="row">
        <div style="flex:1;min-width:260px">
          <label>Bio</label><textarea id="bio"></textarea>
          <label>Catchphrase</label><input id="catchphrase" />
          <button class="btn" id="saveProfile">Save Profile</button>
          <p class="muted" id="profileStats"></p>
        </div>
        <div style="flex:1;min-width:260px">
          <h3>My 3 Café Slots</h3>
          <div id="profileSlots"></div>
        </div>
      </div>
      <button class="btn sub" id="closeProfile">Close</button>
    </div>
  </div>

  <div class="top">
    <div class="brand">☕ Brew Empire</div>
    <div id="stats">Coins: 0 | CPC 1 | CPS 0</div>
  </div>
  <div class="layout">
    <aside class="panel"><h3>Shop</h3><div id="shop"></div></aside>
    <main class="panel center" id="center"><button id="cup" class="cup">☕</button></main>
    <aside class="panel"><h3>Feed</h3><div id="feed"></div></aside>
  </div>
  <div class="nav">
    <button class="btn" id="openProfile">👤 Profile</button>
    <button class="btn sub" id="manualSave">💾 Save</button>
    <button class="btn sub" id="switchSlot">🗂️ Switch Slot</button>
    <button class="btn sub" id="resetSlot">♻️ Reset Slot</button>
  </div>

  <script>
    const ACCOUNT_KEY='brew_empire_accounts_v1';
    let activeUser=null, activeSlot=0, GAME_KEY='';
    const $=s=>document.querySelector(s);
    const DS=()=>({cafeName:'My Café',coins:0,lifetime:0,cpc:1,cps:0,level:1,xp:0,review:3.5,theme:'Classic',decorScore:0,hist:[],upgrades:{barista:0,machine:0}});
    let S=DS();

    const loadAccounts=()=>JSON.parse(localStorage.getItem(ACCOUNT_KEY)||'{}');
    const saveAccounts=a=>localStorage.setItem(ACCOUNT_KEY,JSON.stringify(a));
    const xpNeed=l=>l<=10?100:l<=20?300:l<=30?800:l<=40?2000:l<=50?5000:l<=60?12000:l<=70?30000:l<=80?75000:l<=90?200000:500000;

    function defaultSlots(){return [1,2,3].map(i=>({id:i,name:`Café Slot ${i}`,isMain:i===1,lastTransferDay:'',saveKey:''}));}
    function accountTemplate(username){return {username,createdAt:new Date().toISOString(),profile:{bio:'',catchphrase:''},slots:defaultSlots(),loginStreak:1,lastSeen:new Date().toISOString()};}
    function getAccount(username){const db=loadAccounts();return db[username]||null;}
    function setAccount(acc){const db=loadAccounts();db[acc.username]=acc;saveAccounts(db);}
    function ensureAccount(username){const existing=getAccount(username);if(existing)return existing;const acc=accountTemplate(username);setAccount(acc);return acc;}

    function flash(msg){S.hist.unshift(new Date().toLocaleTimeString()+` — ${msg}`);S.hist=S.hist.slice(0,24);renderFeed();}
    function saveGame(){if(!GAME_KEY)return;localStorage.setItem(GAME_KEY,JSON.stringify(S));flash('Auto-saved.');syncSlotMeta();}
    function syncSlotMeta(){if(!activeUser)return;const acc=getAccount(activeUser.username);const slot=acc.slots[activeSlot];slot.saveKey=GAME_KEY;slot.name=S.cafeName;slot.review=S.review;slot.theme=S.theme;setAccount(acc);}

    function gainXP(v){S.xp+=v;while(S.xp>=xpNeed(S.level)){S.xp-=xpNeed(S.level);S.level++;flash(`Level up! Lv.${S.level}`);} }
    function cpc(){return S.cpc+S.upgrades.barista*2+S.upgrades.machine*4;}
    function cps(){return S.cps+S.upgrades.barista*2+S.upgrades.machine*5;}
    function coin(v){S.coins+=v;S.lifetime+=v;gainXP(v*0.1);render();}

    function render(){
      $('#stats').innerHTML=`Coins: ${Math.floor(S.coins).toLocaleString()} | CPC ${cpc()} | CPS ${cps()} | Lv ${S.level}`;
      $('#shop').innerHTML=`
        <div class='card'><b>Extra Barista</b><div class='muted'>+2 CPC +2 CPS</div><button class='btn' data-u='barista'>Buy ${Math.floor(100*Math.pow(1.7,S.upgrades.barista))}</button></div>
        <div class='card'><b>Espresso Machine</b><div class='muted'>+4 CPC +5 CPS</div><button class='btn' data-u='machine'>Buy ${Math.floor(200*Math.pow(1.8,S.upgrades.machine))}</button></div>
        <div class='card'><label>Café Name</label><input id='cafeName' value="${S.cafeName.replace(/"/g,'&quot;')}"></div>
        <div class='card'><div>XP</div><div class='xp'><div style='width:${(S.xp/xpNeed(S.level))*100}%'></div></div><div class='muted'>${Math.floor(S.xp)} / ${xpNeed(S.level)}</div></div>`;
      document.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>buyUpgrade(b.dataset.u));
      $('#cafeName').onchange=e=>{S.cafeName=e.target.value||'My Café';syncSlotMeta();};
      renderFeed();
    }

    function renderFeed(){ $('#feed').innerHTML=S.hist.map(x=>`<div class='card'>${x}</div>`).join('')||"<div class='muted'>Welcome to Brew Empire.</div>"; }
    function buyUpgrade(k){const level=S.upgrades[k];const base=k==='barista'?100:200;const scale=k==='barista'?1.7:1.8;const cost=Math.floor(base*Math.pow(scale,level));if(S.coins<cost)return;S.coins-=cost;S.upgrades[k]++;gainXP(50);flash(`Bought ${k}.`);render();}

    $('#cup').onclick=e=>{const v=cpc();coin(v);gainXP(0.1);const n=document.createElement('div');n.className='coin';n.textContent=`+${v}`;n.style.left=(e.offsetX+120)+'px';n.style.top=(e.offsetY+120)+'px';$('#center').appendChild(n);setTimeout(()=>n.remove(),900);};
    setInterval(()=>{if(GAME_KEY){coin(cps());}},1000);
    setInterval(()=>{if(GAME_KEY)saveGame();},30000);
    addEventListener('beforeunload',()=>{if(GAME_KEY)saveGame(); if(activeUser){const acc=getAccount(activeUser.username);acc.lastSeen=new Date().toISOString();setAccount(acc);}});

    function enterSlot(idx){activeSlot=idx;GAME_KEY=`brew_empire_${activeUser.username}_slot_${idx}`;S=Object.assign(DS(),JSON.parse(localStorage.getItem(GAME_KEY)||'{}'));$('#auth').classList.add('hidden');$('#slotScreen').classList.add('hidden');render();flash(`Loaded ${activeUser.slots[idx].name}`);syncSlotMeta();}

    function renderSlots(){const acc=getAccount(activeUser.username);activeUser=acc;$('#slotCards').innerHTML=acc.slots.map((s,i)=>`<div class='card slot'><b>${s.name}</b>${s.isMain?" ⭐ Main":""}<div class='muted'>Theme: ${s.theme||'Classic'} • Review: ${(s.review||3.5).toFixed? (s.review||3.5).toFixed(1):s.review||3.5}</div><div class='row'><button class='btn' data-play='${i}'>Play</button><button class='btn sub' data-main='${i}'>Set Main</button><button class='btn sub' data-del='${i}'>Delete</button></div></div>`).join('');
      document.querySelectorAll('[data-play]').forEach(b=>b.onclick=()=>enterSlot(+b.dataset.play));
      document.querySelectorAll('[data-main]').forEach(b=>{b.onclick=()=>{acc.slots.forEach(x=>x.isMain=false);acc.slots[+b.dataset.main].isMain=true;setAccount(acc);renderSlots();};});
      document.querySelectorAll('[data-del]').forEach(b=>{b.onclick=()=>{const i=+b.dataset.del;if(confirm('Delete this slot and restart it?')){localStorage.removeItem(`brew_empire_${acc.username}_slot_${i}`);acc.slots[i]={id:i+1,name:`Café Slot ${i+1}`,isMain:acc.slots[i].isMain,saveKey:''};setAccount(acc);renderSlots();}}});
    }

    function openProfile(){const acc=getAccount(activeUser.username);acc.visits=(acc.visits||0)+1;setAccount(acc);$('#bio').value=acc.profile?.bio||'';$('#catchphrase').value=acc.profile?.catchphrase||'';$('#profileStats').textContent=`User: ${acc.username} • Created: ${new Date(acc.createdAt).toLocaleDateString()} • Last seen: ${acc.lastSeen?new Date(acc.lastSeen).toLocaleString():'Now'} • Login streak: ${acc.loginStreak||1}`;
      $('#profileSlots').innerHTML=acc.slots.map(s=>`<div class='card'><b>${s.name}</b>${s.isMain?' ⭐ Main':''}<div class='muted'>Theme: ${s.theme||'Classic'} • Review: ${((s.review||3.5).toFixed? (s.review||3.5).toFixed(1):s.review||3.5)}</div></div>`).join('');
      $('#profileScreen').classList.remove('hidden');
    }

    function enterWithUsername(){const username=$('#usernameInput').value.trim();if(!username){$('#authMsg').textContent='Please enter a username.';return;}activeUser=ensureAccount(username);$('#slotScreen').classList.remove('hidden');renderSlots();}

    $('#enterBtn').onclick=enterWithUsername;
    $('#usernameInput').addEventListener('keydown',e=>{if(e.key==='Enter')enterWithUsername();});
    $('#logoutBtn').onclick=()=>{activeUser=null;GAME_KEY='';$('#slotScreen').classList.add('hidden');$('#auth').classList.remove('hidden');};
    $('#openProfile').onclick=()=>activeUser&&openProfile();
    $('#closeProfile').onclick=()=>$('#profileScreen').classList.add('hidden');
    $('#saveProfile').onclick=()=>{const acc=getAccount(activeUser.username);acc.profile={bio:$('#bio').value,catchphrase:$('#catchphrase').value};setAccount(acc);};
    $('#switchSlot').onclick=()=>{if(!activeUser)return;saveGame();$('#slotScreen').classList.remove('hidden');renderSlots();};
    $('#manualSave').onclick=()=>saveGame();
    $('#resetSlot').onclick=()=>{if(confirm('Reset current slot?')){S=DS();saveGame();render();}};

    // Limited daily transfer between own slots (+500 coins token)
    document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='t'&&activeUser){const acc=getAccount(activeUser.username);const d=new Date().toDateString();const s=acc.slots[activeSlot];if(s.lastTransferDay===d){flash('Daily transfer already used today.');return;} const target=acc.slots.find((_,i)=>i!==activeSlot);if(!target)return;const targetKey=`brew_empire_${acc.username}_slot_${target.id-1}`;const targetState=Object.assign(DS(),JSON.parse(localStorage.getItem(targetKey)||'{}'));if(S.coins<500)return flash('Need 500 coins to transfer.');S.coins-=500;targetState.coins+=500;localStorage.setItem(targetKey,JSON.stringify(targetState));s.lastTransferDay=d;setAccount(acc);flash(`Transferred 500 coins to ${target.name}.`);render();}});
  </script>
</body>
</html>
